<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INASEP — Clases en Vivo / Integración SENCE</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>

<style>
/* ══════════════════════════════════════════════
   VARIABLES — hereda paleta INASEP
══════════════════════════════════════════════ */
:root {
  --green-900: #0d1f14;
  --green-800: #142a1b;
  --green-700: #1e3d28;
  --green-600: #2a5536;
  --green-500: #3d7a4e;
  --green-400: #4a8c5c;
  --green-300: #68a87a;
  --green-200: #9fcfab;
  --green-100: #d4edda;
  --green-50:  #f0f8f2;
  --primary:      #4a8c5c;
  --primary-dark: #3d7a4e;
  --primary-light:#68a87a;
  --accent:       #8fbc8f;
  --sidebar-bg:   #0d1f14;
  --sidebar-nav:  #142a1b;
  --sidebar-hover:#1e3d28;
  --sidebar-border: rgba(255,255,255,0.07);
  --bg:       #f4f7f5;
  --card-bg:  #ffffff;
  --text:     #1a2e1e;
  --text-mid: #4a6651;
  --text-light:#7a9880;
  --border:   #d6e8da;
  --success: #27ae60;
  --warning: #e67e22;
  --danger:  #c0392b;
  --info:    #2980b9;
  --sence-blue: #003087;
  --sence-red:  #c8102e;
  --radius:  10px;
  --radius-lg: 16px;
  --shadow:  0 2px 14px rgba(13,31,20,0.08);
  --shadow-md: 0 6px 24px rgba(13,31,20,0.13);
  --transition: 0.18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ══════════════════════════════════════════════
   LAYOUT PRINCIPAL
══════════════════════════════════════════════ */
.dashboard { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top:0; left:0; bottom:0;
  z-index: 200;
  overflow-y: auto;
  transition: transform 0.28s ease;
}
.sidebar-top {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--sidebar-border);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-top .brand { color:#fff; font-size:15px; font-weight:700; }
.sidebar-top .sub   { color: rgba(255,255,255,0.45); font-size:11px; margin-top:2px; }
.sidebar-nav { flex:1; padding: 10px 0; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px;
  color: rgba(255,255,255,0.65);
  text-decoration: none;
  font-size: 13.5px; font-weight: 500;
  transition: var(--transition);
  cursor: pointer;
  border-left: 3px solid transparent;
}
.sidebar-nav a:hover { background: var(--sidebar-hover); color:#fff; }
.sidebar-nav a.active {
  background: var(--sidebar-hover);
  color: var(--green-200);
  border-left-color: var(--green-300);
  font-weight: 600;
}
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--sidebar-border);
}
.sidebar-footer button {
  background: none; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.55); padding: 8px 14px;
  border-radius: 7px; font-size: 12.5px; cursor: pointer;
  width: 100%; font-family: inherit; transition: var(--transition);
}
.sidebar-footer button:hover { background: rgba(255,255,255,0.07); color:#fff; }

.main-wrapper { margin-left: 260px; flex:1; display:flex; flex-direction:column; }
.topbar {
  height: 60px; background:#fff; border-bottom:1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
  position: sticky; top:0; z-index:100; box-shadow: var(--shadow);
}
.topbar-title { font-size:16px; font-weight:700; color:var(--green-900); margin-right:auto; }
.topbar-user {
  display:flex; align-items:center; gap:8px;
  font-size:13px; font-weight:600; color:var(--text-mid);
}
.avatar {
  width:32px; height:32px; border-radius:50%;
  background:var(--green-500); color:#fff;
  font-weight:700; font-size:13px;
  display:flex; align-items:center; justify-content:center;
}
.mob-menu-btn {
  display:none; background:var(--sidebar-bg); border:none;
  color:#fff; width:38px; height:38px; border-radius:8px;
  font-size:18px; cursor:pointer; align-items:center; justify-content:center;
}
.mob-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.45); z-index:150;
}
.mob-overlay.active { display:block; }
.main-content { padding: 28px 32px; flex:1; }

/* ══════════════════════════════════════════════
   SENCE BADGE
══════════════════════════════════════════════ */
.sence-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--sence-blue) 0%, #004bb5 100%);
  color: #fff; padding: 5px 14px; border-radius: 20px;
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.5px;
}
.sence-badge-red {
  background: linear-gradient(135deg, var(--sence-red) 0%, #e8192d 100%);
}

/* ══════════════════════════════════════════════
   PAGE HEADER
══════════════════════════════════════════════ */
.page-header {
  margin-bottom: 24px; display:flex; align-items:flex-start;
  justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.page-header h2 { font-size:22px; font-weight:700; color:var(--green-900); }
.breadcrumb { font-size:12.5px; color:var(--text-light); margin-top:3px; }
.breadcrumb a { color:var(--primary); text-decoration:none; cursor:pointer; }

/* ══════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════ */
.card {
  background:var(--card-bg); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:22px 24px;
  margin-bottom:18px; border:1px solid var(--border);
}
.card-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px; flex-wrap:wrap; gap:10px;
}
.card-header h3 { font-size:16px; font-weight:700; color:var(--green-900); }

/* Stat Cards */
.stats-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px; margin-bottom:24px;
}
.stat-card {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow);
}
.stat-card .stat-icon { font-size:26px; margin-bottom:8px; }
.stat-card .stat-value { font-size:26px; font-weight:700; color:var(--primary); line-height:1; }
.stat-card .stat-label { font-size:12px; color:var(--text-light); margin-top:4px; font-weight:500; text-transform:uppercase; letter-spacing:0.4px; }

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 20px; border:none; border-radius:8px;
  font-size:13.5px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:var(--transition);
  text-decoration:none; letter-spacing:0.2px; white-space:nowrap;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); box-shadow:0 4px 16px rgba(74,140,92,0.35); transform:translateY(-1px); }
.btn-secondary { background:#eef3f0; color:var(--text-mid); }
.btn-secondary:hover { background:#dde8e1; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#a93226; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#219a52; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-warning:hover { background:#ca6f1e; }
.btn-info { background:var(--info); color:#fff; }
.btn-info:hover { background:#1f6ea3; }
.btn-sm { padding:6px 13px; font-size:12px; border-radius:6px; }
.btn:disabled { opacity:0.55; cursor:not-allowed; transform:none !important; }
.btn-sence {
  background: linear-gradient(135deg, var(--sence-blue), #0041a0);
  color:#fff; border:none;
}
.btn-sence:hover { opacity:0.9; transform:translateY(-1px); }
.btn-live {
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  color:#fff; animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}

/* ══════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th, td { padding:11px 14px; text-align:left; border-bottom:1px solid #eef2ef; }
th { background:var(--green-50); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-mid); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f9fcfa; }

/* ══════════════════════════════════════════════
   BADGE
══════════════════════════════════════════════ */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-green  { background:#e6f9ee; color:#1a7a3a; }
.badge-gray   { background:#f0f0f0; color:#666; }
.badge-blue   { background:#e6f0ff; color:#1a56db; }
.badge-orange { background:#fef3e6; color:#b45309; }
.badge-red    { background:#fde8e8; color:#a93226; }
.badge-live   { background:#fde8e8; color:#c0392b; animation: blinkBadge 1.5s ease infinite; }
@keyframes blinkBadge { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(13,31,20,0.65);
  z-index:999; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(4px);
}
.modal {
  background:#fff; border-radius:var(--radius-lg);
  padding:28px 30px; width:100%; max-width:680px;
  max-height:90vh; overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.3);
}
.modal h3 { margin-bottom:18px; font-size:18px; font-weight:700; color:var(--green-900); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }
.modal-wide { max-width: 900px; }

/* ══════════════════════════════════════════════
   FORM
══════════════════════════════════════════════ */
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-mid); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:11px 13px; border:2px solid var(--border);
  border-radius:8px; font-size:14px; font-family:inherit;
  background:#fafcfb; color:var(--text); transition:var(--transition); resize:vertical;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline:none; border-color:var(--primary); background:#fff;
  box-shadow:0 0 0 3px rgba(74,140,92,0.12);
}
.form-group small { display:block; margin-top:5px; font-size:12px; color:var(--text-light); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* ══════════════════════════════════════════════
   CLASE EN VIVO — CARD ESPECIAL
══════════════════════════════════════════════ */
.live-class-card {
  background:#fff; border-radius:var(--radius-lg);
  border:1px solid var(--border); overflow:hidden;
  box-shadow:var(--shadow); transition:var(--transition);
  margin-bottom:16px;
}
.live-class-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.live-class-header {
  background: linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 100%);
  padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
}
.live-class-header h4 { color:#fff; font-size:15px; font-weight:700; }
.live-class-body { padding:18px 20px; }
.live-class-meta {
  display:flex; gap:16px; flex-wrap:wrap;
  font-size:13px; color:var(--text-mid); margin-bottom:14px;
}
.live-class-meta span { display:flex; align-items:center; gap:5px; }
.live-class-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ══════════════════════════════════════════════
   VIDEO PLAYER AREA
══════════════════════════════════════════════ */
.video-room {
  background:#000; border-radius:var(--radius-lg);
  overflow:hidden; position:relative; min-height:500px;
  display:flex; align-items:center; justify-content:center;
}
.video-placeholder {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.6); gap:12px; padding:40px;
  text-align:center;
}
.video-placeholder .icon { font-size:60px; opacity:0.4; }
iframe.video-frame { width:100%; height:100%; min-height:500px; border:none; }

/* Cronómetro de sesión */
.session-timer {
  background: linear-gradient(135deg, var(--green-900), var(--green-700));
  border-radius:var(--radius); padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  color:#fff; margin-bottom:16px;
}
.timer-display {
  font-family:'DM Mono',monospace; font-size:32px; font-weight:500;
  color:var(--green-200); letter-spacing:3px;
}
.timer-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.5); margin-bottom:2px; }
.timer-warning .timer-display { color:#f1c40f; animation: blinkBadge 1s ease infinite; }
.timer-danger  .timer-display { color:#e74c3c; animation: blinkBadge 0.5s ease infinite; }

/* ══════════════════════════════════════════════
   SENCE INTEGRATION PANEL
══════════════════════════════════════════════ */
.sence-panel {
  border:2px solid var(--sence-blue); border-radius:var(--radius-lg);
  overflow:hidden; margin-bottom:16px;
}
.sence-panel-header {
  background: var(--sence-blue); color:#fff;
  padding:12px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.sence-panel-header h4 { font-size:14px; font-weight:700; }
.sence-panel-body { padding:18px 20px; background:#f8fbff; }

.sence-info-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px; margin-bottom:14px;
}
.sence-info-item label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:#666; display:block; margin-bottom:3px; }
.sence-info-item span { font-size:13.5px; font-weight:600; color:var(--text); font-family:'DM Mono',monospace; }

/* Asistencia estado */
.attendance-status {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; border-radius:10px;
  font-weight:600; font-size:14px; margin-bottom:14px;
}
.attendance-status.open    { background:#e6f9ee; color:#1a7a3a; border:2px solid #27ae60; }
.attendance-status.closed  { background:#fde8e8; color:#a93226; border:2px solid var(--danger); }
.attendance-status.pending { background:#fff8e6; color:#b45309; border:2px solid #e67e22; }
.attendance-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dot-green  { background:var(--success); animation:blinkBadge 2s ease infinite; }
.dot-red    { background:var(--danger); }
.dot-orange { background:var(--warning); animation:blinkBadge 2s ease infinite; }

/* ══════════════════════════════════════════════
   PARTICIPANTES TABLE
══════════════════════════════════════════════ */
.participant-row td { vertical-align:middle; }
.participant-avatar {
  width:30px; height:30px; border-radius:50%;
  background:var(--green-500); color:#fff;
  font-weight:700; font-size:12px;
  display:inline-flex; align-items:center; justify-content:center;
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
.toast-container { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; max-width:360px; }
.toast {
  background:#fff; border-radius:10px; padding:13px 16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15); display:flex; align-items:center; gap:10px;
  font-size:13.5px; font-weight:500; border-left:4px solid var(--primary);
  animation:slideInRight 0.25s ease;
}
.toast.success { border-color:var(--success); }
.toast.error   { border-color:var(--danger); }
.toast.warning { border-color:var(--warning); }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }

/* ══════════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════════ */
.auth-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px;
  background:var(--green-900);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(74,140,92,0.18) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(143,188,143,0.10) 0%, transparent 50%);
}
.auth-card {
  background:#fff; border-radius:var(--radius-lg);
  padding:40px 36px 36px; width:100%; max-width:430px;
  box-shadow:0 24px 64px rgba(0,0,0,0.35);
}
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo .brand-name { font-size:32px; font-weight:800; color:var(--green-400); letter-spacing:2px; }
.auth-logo .brand-sub { font-size:12px; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
.auth-card h2 { font-size:19px; font-weight:700; color:var(--green-900); margin-bottom:22px; text-align:center; }
.alert { padding:11px 15px; border-radius:8px; font-size:13px; font-weight:500; display:none; margin-bottom:16px; border-left:4px solid; }
.alert-error   { background:#fdecea; color:#9b2335; border-color:#e74c3c; }
.alert-success { background:#eafaf1; color:#1e7e34; border-color:#27ae60; }

/* ══════════════════════════════════════════════
   UTILIDADES
══════════════════════════════════════════════ */
.hidden { display:none !important; }
.flex { display:flex; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.mt-1 { margin-top:6px; }
.mt-2 { margin-top:14px; }
.mb-2 { margin-bottom:14px; }
.text-right { text-align:right; }
.text-center { text-align:center; }
.empty-state { text-align:center; padding:50px 20px; color:var(--text-light); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* ══════════════════════════════════════════════
   SECCIÓN: CÓMO FUNCIONA SENCE
══════════════════════════════════════════════ */
.how-it-works { display:flex; gap:0; overflow:hidden; border-radius:var(--radius); border:1px solid var(--border); }
.hiw-step {
  flex:1; padding:18px 16px; text-align:center; border-right:1px solid var(--border);
  background:#fff;
}
.hiw-step:last-child { border-right:none; }
.hiw-num {
  width:36px; height:36px; border-radius:50%; background:var(--green-100); color:var(--green-900);
  font-weight:800; font-size:15px; display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:8px;
}
.hiw-step h5 { font-size:12.5px; font-weight:700; color:var(--green-900); margin-bottom:4px; }
.hiw-step p  { font-size:11.5px; color:var(--text-light); line-height:1.5; }

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
/* ══════════════════════════════════════════════
   RESPONSIVE — TABLET (≤ 900px)
══════════════════════════════════════════════ */
@media (max-width: 900px) {
  .sence-info-grid { grid-template-columns: 1fr 1fr; }
  .live-class-meta { gap:10px; }
}

/* ══════════════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 768px)
══════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Sidebar deslizable */
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: none; box-shadow: 4px 0 24px rgba(0,0,0,0.25); }
  .main-wrapper { margin-left: 0; }
  .mob-menu-btn { display: flex; }

  /* Layout general */
  .main-content { padding: 12px; }
  .page-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .page-header > div:last-child,
  .page-header > button,
  .page-header .flex { width: 100%; }
  .page-header .btn { width: 100%; justify-content: center; }

  /* Grids */
  .form-row { grid-template-columns: 1fr; }

/* ════════════════════════════════════════════════
   HELPERS RUT
════════════════════════════════════════════════ */
function formatRutInput(input) {
  let v = input.value.replace(/[^0-9kK]/g, '').toUpperCase();
  if (v.length > 1) v = v.slice(0, -1) + '-' + v.slice(-1);
  input.value = v;
}

function rutToEmail(rut) {
  // Convertimos el RUT a un email interno ficticio para Firebase Auth
  // Ej: 12345678-9 → rut.123456789@inasep.cl
  const clean = rut.replace(/-/g, '').replace(/\./g, '').toLowerCase();
  return `rut.${clean}@inasep-lms.cl`;
}

function validarRut(rut) {
  const clean = rut.replace(/\./g, '').replace(/-/g, '');
  if (clean.length < 2) return false;
  const dv  = clean.slice(-1).toLowerCase();
  const num = clean.slice(0, -1);
  if (!/^\d+$/.test(num)) return false;
  let suma = 0, mult = 2;
  for (let i = num.length - 1; i >= 0; i--) {
    suma += parseInt(num[i]) * mult;
    mult = mult === 7 ? 2 : mult + 1;
  }
  const dvEsp = 11 - (suma % 11);
  const dvCalc = dvEsp === 11 ? '0' : dvEsp === 10 ? 'k' : String(dvEsp);
  return dv === dvCalc;
}

function toggleAdminLogin() {
  document.getElementById('loginRutForm').classList.toggle('hidden');
  document.getElementById('loginEmailForm').classList.toggle('hidden');
  document.getElementById('alertAuth').style.display = 'none';

/* ════════════════════════════════════════════════
   LOGIN POR RUT (alumnos)
════════════════════════════════════════════════ */
async function loginConRut() {
  const rut  = document.getElementById('loginRut').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!rut || !pass) return showAuthAlert('Ingresa tu RUT y contraseña.');
  if (!validarRut(rut)) return showAuthAlert('RUT inválido. Verifica el formato (Ej: 12345678-9).');
  const email = rutToEmail(rut);
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(err) {
    const msgs = {
      'auth/user-not-found'    : 'RUT no registrado en el sistema. Contacta al administrador.',
      'auth/wrong-password'    : 'Contraseña incorrecta.',
      'auth/invalid-credential': 'RUT o contraseña incorrectos.',
      'auth/too-many-requests' : 'Demasiados intentos. Espera unos minutos.'
    };
    showAuthAlert(msgs[err.code] || 'Error al iniciar sesión.');
  }
}

════════════════════════════════════════════════ */

  const email = document.getElementById('loginEmail').value.trim();

      'auth/user-not-found'    : 'Usuario no encontrado.',

      'auth/invalid-credential': 'Credenciales inválidas.',
      'auth/too-many-requests' : 'Demasiados intentos. Espera unos minutos.'
    };
    showAuthAlert(msgs[err.code] || 'Error al iniciar sesión.');
  }
}

function logout() {

  auth.signOut();
}

function showAuthAlert(msg) {
  const el = document.getElementById('alertAuth');
  el.textContent = msg;
  el.className = 'alert alert-error';
  el.style.display = 'block';
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateTime(ts) {
  if (!ts) return '—';

async function renderLiveClasses(mc) {
  mc.innerHTML = `
    <div class="page-header">
      <div><h2>📹 Clases en Vivo</h2><div class="breadcrumb">Gestión de videoconferencias con registro SENCE</div></div>

    </div>
    <div id="classesContainer"><div class="empty-state"><div class="icon">⏳</div><p>Cargando clases...</p></div></div>`;

  try {
    const snap = await db.collection('liveClasses').orderBy('scheduledAt','desc').get();
    const cont = document.getElementById('classesContainer');
    if (snap.empty) {
      cont.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No hay clases programadas.</p></div>`;
      return;
    }

    cont.innerHTML = snap.docs.map(doc => {
      const c = doc.data();
      const isLive = c.status === 'active';
      const isPast = c.status === 'finished';
      const statusBadge = isLive
        ? '<span class="badge badge-live">🔴 EN VIVO</span>'
        : isPast ? '<span class="badge badge-gray">✅ Finalizada</span>'
        : '<span class="badge badge-blue">📅 Programada</span>';
      const btn = currentRole === 'admin'
        ? `<button class="btn btn-sm btn-warning" onclick="event.stopPropagation();editClass('${doc.id}')">✏️ Editar</button>
           <button class="btn btn-sm btn-danger"  onclick="event.stopPropagation();deleteClass('${doc.id}')">🗑️</button>
           <button class="btn btn-sm ${isLive?'btn-danger':'btn-success'}" onclick="event.stopPropagation();toggleClassStatus('${doc.id}','${c.status}')">
             ${isLive?'⏹ Finalizar':'▶️ Iniciar'}
           </button>`
        : currentRole === 'teacher'
        ? `<button class="btn btn-sm ${isLive?'btn-live':'btn-primary'}" onclick="navigate('teacher-room',{id:'${doc.id}'})">
             ${isLive ? '👨‍🏫 Entrar como Profesor' : '👁️ Ver Clase'}
           </button>`
        : `<button class="btn btn-sm btn-primary" onclick="navigate('class-room',{id:'${doc.id}'})">
             ${isLive ? '🔴 Entrar EN VIVO' : '👁️ Ver Clase'}
           </button>`;

      return `
        <div class="live-class-card">
          <div class="live-class-header">
            <h4>${escHtml(c.title)}</h4>
            ${statusBadge}
          </div>
          <div class="live-class-body">
            <div class="live-class-meta">
              <span>📅 ${fmtDateTime(c.scheduledAt)}</span>
              <span>⏱ ${c.duration || 60} min</span>
              <span>🎓 ${escHtml(c.courseName || 'Sin curso')}</span>
              <span>📋 CodSENCE: <strong>${escHtml(c.codSence || '—')}</strong></span>
            </div>
            ${c.description ? `<p style="font-size:13px;color:var(--text-mid);margin-bottom:12px;">${escHtml(c.description)}</p>` : ''}
            <div class="live-class-actions">${btn}</div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('classesContainer').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${e.message}</p></div>`;
  }
}

function updateVideoFields() {
  const type  = document.getElementById('fc_videoType').value;
  const label = document.getElementById('videoUrlLabel');
  const help  = document.getElementById('videoUrlHelp');
  const jitsi = document.getElementById('jitsiConfig');
  const hints = {
    youtube: ['URL YouTube Live / Embed', 'Ej: https://www.youtube.com/watch?v=XXXXX o https://youtu.be/XXXXX'],
    meet:    ['URL Google Meet', 'Ej: https://meet.google.com/xxx-xxxx-xxx'],
    zoom:    ['URL Zoom', 'Ej: https://us02web.zoom.us/j/XXXXXXXXX'],
    teams:   ['URL Microsoft Teams', 'Pega el enlace de unión a la reunión'],
    jitsi:   ['URL Jitsi (opcional)', 'Déjala vacía para usar el nombre de sala a continuación'],
    custom:  ['URL personalizada', 'Cualquier URL de videoconferencia compatible con iframe']
  };
  const [l, h] = hints[type] || hints.custom;
  if (label) label.textContent = l;
  if (help)  help.textContent  = h;
  if (jitsi) jitsi.classList.toggle('hidden', type !== 'jitsi');
}

async function saveClass(id) {
  const title       = document.getElementById('fc_title').value.trim();
  const courseName  = document.getElementById('fc_courseName').value.trim();
  const description = document.getElementById('fc_desc').value.trim();
  const dateVal     = document.getElementById('fc_date').value;
  const duration    = parseInt(document.getElementById('fc_duration').value) || 60;
  const codSence    = document.getElementById('fc_codSence').value.trim();
  const codigoCurso = document.getElementById('fc_codigoCurso').value.trim();
  const linea       = parseInt(document.getElementById('fc_linea').value);
  const status      = document.getElementById('fc_status').value;
  const videoType   = document.getElementById('fc_videoType').value;
  let   videoUrl    = document.getElementById('fc_videoUrl').value.trim();
  const jitsiRoom   = document.getElementById('fc_jitsiRoom')?.value.trim() || '';

  // Jitsi auto-URL
  if (videoType === 'jitsi' && !videoUrl && jitsiRoom) {
    videoUrl = `https://meet.jit.si/${encodeURIComponent(jitsiRoom)}`;
  }

  if (!title || title.length < 3)     return toast('⚠️ El título debe tener al menos 3 caracteres.','warning');
  if (!dateVal)                        return toast('⚠️ Selecciona fecha y hora.','warning');
  if (!codSence)                       return toast('⚠️ El Código SENCE es obligatorio.','warning');
  if (!codigoCurso || codigoCurso.length < 7) return toast('⚠️ El Código de Curso debe tener al menos 7 caracteres.','warning');

  const data = {
    title, courseName, description,
    scheduledAt: firebase.firestore.Timestamp.fromDate(new Date(dateVal)),
    duration, codSence, codigoCurso, lineaCapacitacion: linea,
    status, videoType, videoUrl, jitsiRoom,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: currentUser.uid
  };

  try {
    if (id) {
      await db.collection('liveClasses').doc(id).update(data);
      toast('✅ Clase actualizada.','success');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('liveClasses').add(data);
      toast('✅ Clase creada correctamente.','success');
    }
    navigate('live-classes');
  } catch(e) {
    toast('❌ Error: ' + e.message,'error');
  }
}

async function editClass(id) {
  const doc = await db.collection('liveClasses').doc(id).get();
  if (doc.exists) navigate('new-class', { id, data: { id, ...doc.data() } });
}

async function deleteClass(id) {
  if (!confirm('¿Eliminar esta clase y todos sus registros de asistencia?')) return;
  const batch = db.batch();
  const attSnap = await db.collection('senceAttendance').where('classId','==',id).get();
  attSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(db.collection('liveClasses').doc(id));
  await batch.commit();
  toast('🗑️ Clase eliminada.','success');
  navigate('live-classes');
}

async function toggleClassStatus(id, current) {
  const newStatus = current === 'active' ? 'finished' : 'active';
  await db.collection('liveClasses').doc(id).update({ status: newStatus });
  toast(`✅ Clase ${newStatus==='active'?'iniciada en vivo':'finalizada'}.`,'success');
  navigate('live-classes');
}

/* ════════════════════════════════════════════════
   HEARTBEAT — actualiza lastSeen cada 60s en Firestore
   Detecta sesiones huérfanas (alumno cerró navegador)
════════════════════════════════════════════════ */
function startHeartbeat(attDocId) {
  stopHeartbeat();
  // Actualización inmediata al inicio
  db.collection('senceAttendance').doc(attDocId).update({
    lastSeen:  firebase.firestore.FieldValue.serverTimestamp(),
    userAgent: navigator.userAgent.slice(0, 200)
  }).catch(() => {});

  heartbeatTimer = setInterval(async () => {
    try {
      await db.collection('senceAttendance').doc(attDocId).update({
        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) {
      // Si falla (sin internet), no hacer nada — se detectará como huérfana
    }
  }, 60000); // cada 60 segundos

  // Detener el heartbeat si el usuario cierra/recarga la pestaña
  window.addEventListener('beforeunload', stopHeartbeat, { once: true });
}

function stopHeartbeat() {
  if (heartbeatTimer) {
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
}

/* Cronómetro */
function startTimer(startDate, durationMin) {
  if (sessionTimer) clearInterval(sessionTimer);
  const box = document.getElementById('sessionTimerBox');

  sessionTimer = setInterval(() => {
    const now     = new Date();
    const elapsed = Math.floor((now - startDate) / 1000);
    const hrs  = Math.floor(elapsed / 3600);
    const mins = Math.floor((elapsed % 3600) / 60);
    const secs = elapsed % 60;
    const display = document.getElementById('timerDisplay');
    if (display) {
      display.textContent = `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    }
    if (box) {
      const remaining = durationMin * 60 - elapsed;
      box.className = 'session-timer';
      if (remaining <= 0)  box.classList.add('timer-danger');
      else if (remaining <= 600) {
        box.classList.add('timer-warning');
        // Alerta a los 10 min
        if (remaining === 600) toast('⚠️ Quedan 10 minutos de clase. Recuerda cerrar sesión SENCE al terminar.','warning',8000);
      }
    }
  }, 1000);
}

/* ════════════════════════════════════════════════
   INTEGRACIÓN SENCE — INICIO DE SESIÓN
   ─────────────────────────────────────────────
   Flujo:
   1. Guardamos estado en Firestore (sessionOpen=false, pendiente)
   2. Enviamos formulario POST a SENCE (IniciarSesion)
   3. SENCE redirige a UrlRetoma con IdSesionSence
   4. La página de retoma lee el POST y actualiza Firestore
════════════════════════════════════════════════ */
async function iniciarSesionSence(classId) {
  if (!await loadSenceConfig()) return; // carga token desde servidor

  const runInput = document.getElementById('alumnoRun');
  const run = runInput ? runInput.value.trim() : '';

  if (!run || !/^\d{7,8}-[\dkK]$/.test(run)) {
    return toast('⚠️ Ingresa un RUN válido (Ej: 12345678-9).','warning');
  }

  const cls = (await db.collection('liveClasses').doc(classId).get()).data();
  if (!cls) return toast('❌ Error: clase no encontrada.','error');

  const idSesionAlumno = genSessionId();
  const userName = currentUser.displayName || currentUser.email.split('@')[0];

  // Crear registro de asistencia en Firestore
  try {
    // Verificar si ya existe registro
    const existing = await db.collection('senceAttendance')
      .where('classId','==',classId).where('userId','==',currentUser.uid).limit(1).get();

    const attData = {
      classId, classTitle: cls.title,
      userId: currentUser.uid, userEmail: currentUser.email, userName,
      runAlumno: run,
      codSence: cls.codSence, codigoCurso: cls.codigoCurso,
      lineaCapacitacion: cls.lineaCapacitacion || 3,
      idSesionAlumno,
      idSesionSence: '', // se llenará cuando SENCE retorne
      sessionOpen: false,
      inicioSesion: null,
      cierreSesion: null,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    let attDocId;
    if (!existing.empty) {
      attDocId = existing.docs[0].id;
      await db.collection('senceAttendance').doc(attDocId).update(attData);
    } else {
      attData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('senceAttendance').add(attData);
      attDocId = ref.id;
    }

    // Guardar estado en sessionStorage para la página de retorno
    sessionStorage.setItem('sence_pending', JSON.stringify({
      classId, attDocId, idSesionAlumno, userId: currentUser.uid
    }));

    // El Worker envía RutOtec y Token desde sus secrets (nunca el HTML).
    toast('🔄 Contactando servidor SENCE...','info',3000);
    const iniRes = await fetch(WORKER_URL + '/api/sence/iniciar', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Worker-Secret': WORKER_SECRET
      },
      body: JSON.stringify({
        codSence:          cls.codSence,
        codigoCurso:       cls.codigoCurso,
        lineaCapacitacion: cls.lineaCapacitacion || 3,
        runAlumno:         run,
        idSesionAlumno,
      })
    });
    if (!iniRes.ok) throw new Error('Error del servidor SENCE (' + iniRes.status + ')');
    // El Worker devuelve el HTML de redirección de SENCE — escribirlo en el documento
    const iniHtml = await iniRes.text();
    document.open(); document.write(iniHtml); document.close();

  } catch(e) {
    toast('❌ Error al iniciar sesión SENCE: ' + e.message,'error');
  }
}

/* ════════════════════════════════════════════════
   INTEGRACIÓN SENCE — CIERRE DE SESIÓN
════════════════════════════════════════════════ */
async function cerrarSesionSence(classId, idSesionSence, idSesionAlumno) {
  if (!await loadSenceConfig()) return; // carga token desde servidor
  if (!confirm('¿Confirmas cerrar tu sesión SENCE? Esto registrará tu asistencia definitivamente.')) return;

  const cls = (await db.collection('liveClasses').doc(classId).get()).data();
  if (!cls) return toast('❌ Clase no encontrada.','error');

  // Obtener registro de asistencia
  const attSnap = await db.collection('senceAttendance')
    .where('classId','==',classId).where('userId','==',currentUser.uid).limit(1).get();

  if (attSnap.empty) return toast('⚠️ No tienes sesión activa para cerrar.','warning');

  const att = { id: attSnap.docs[0].id, ...attSnap.docs[0].data() };
  const run = att.runAlumno;

  // Guardar estado pendiente de cierre
  sessionStorage.setItem('sence_pending_close', JSON.stringify({
    classId, attDocId: att.id, userId: currentUser.uid
  }));

  toast('🔄 Contactando servidor SENCE para cierre...','info',3000);
  const cieRes = await fetch(WORKER_URL + '/api/sence/cerrar', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Worker-Secret': WORKER_SECRET
    },
    body: JSON.stringify({
      codSence:          cls.codSence,
      codigoCurso:       cls.codigoCurso,
      lineaCapacitacion: cls.lineaCapacitacion || 3,
      runAlumno:         run,
      idSesionAlumno:    idSesionAlumno || att.idSesionAlumno,
      idSesionSence:     idSesionSence  || att.idSesionSence,
    })
  });
  if (!cieRes.ok) throw new Error('Error del servidor SENCE (' + cieRes.status + ')');
  const cieHtml = await cieRes.text();
  document.open(); document.write(cieHtml); document.close();
}

/* ════════════════════════════════════════════════
   MANEJAR RETORNO DE SENCE
   ─────────────────────────────────────────────
   SENCE retorna con POST a UrlRetoma/UrlError.
   Como este es un sitio estático, usamos query params
   + sessionStorage para simular.
   
   EN PRODUCCIÓN CON BACKEND (PHP/Node): el endpoint
   recibirá el POST de SENCE directamente y podrá
   actualizar Firestore desde el servidor.
════════════════════════════════════════════════ */
async function handleSenceReturn() {
  const params = new URLSearchParams(window.location.search);
  const retorno = params.get('sence_retorno');
  if (!retorno) return;

  // Limpiar URL
  window.history.replaceState({}, '', window.location.pathname);

  // Capturar IdSesionSence que el Worker reenvía como query param
  const idSesionSence  = params.get('idSesionSence')  || '';
  const idSesionAlumno = params.get('idSesionAlumno') || '';
  const glosa          = params.get('glosa')          || '';

  if (retorno === 'ok') {
    const pending = JSON.parse(sessionStorage.getItem('sence_pending') || 'null');
    sessionStorage.removeItem('sence_pending');
    if (pending) {
      try {
        await db.collection('senceAttendance').doc(pending.attDocId).update({
          sessionOpen:    true,
          idSesionSence:  idSesionSence,   // ← capturado desde el retorno del Worker
          inicioSesion:   firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt:      firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('✅ ¡Sesión SENCE iniciada! Tu asistencia está siendo registrada.','success',6000);
      } catch(e) {
        toast('⚠️ Sesión iniciada pero error al guardar: ' + e.message,'warning');
      }
    } else {
      toast('✅ Inicio de sesión SENCE exitoso.','success');
    }

  } else if (retorno === 'close_ok') {
    stopHeartbeat(); // ← detener heartbeat al cerrar sesión
    const pending = JSON.parse(sessionStorage.getItem('sence_pending_close') || 'null');
    sessionStorage.removeItem('sence_pending_close');
    if (pending) {
      try {
        await db.collection('senceAttendance').doc(pending.attDocId).update({
          sessionOpen:  false,
          cierreSesion: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt:    firebase.firestore.FieldValue.serverTimestamp()
        });
        toast('🏁 Sesión SENCE cerrada correctamente. ¡Asistencia registrada!','success',6000);
      } catch(e) {
        toast('⚠️ Sesión cerrada pero error al guardar: ' + e.message,'warning');
      }
    }

  } else if (retorno === 'error' || retorno === 'close_error') {
    sessionStorage.removeItem('sence_pending');
    sessionStorage.removeItem('sence_pending_close');
    const msg = glosa ? `Error SENCE: ${glosa}` : 'Error en el proceso SENCE. Verifica tu ClaveÚnica e intenta de nuevo.';
    toast('❌ ' + msg,'error',8000);
  }
}

/* ════════════════════════════════════════════════
   CIERRE DE SESIONES HUÉRFANAS (Admin)
   ─────────────────────────────────────────────
   Detecta alumnos con sessionOpen=true cuyo lastSeen
   lleva más de N minutos sin actualizarse (navegador cerrado).
   El admin confirma y cierra manualmente en Firestore.
════════════════════════════════════════════════ */
async function cerrarSesionesHuerfanas() {
  const TIMEOUT_MIN = 10; // considera huérfana si lastSeen > 10 min sin actualizar

  toast('🔍 Buscando sesiones huérfanas...', 'info', 3000);

  try {
    const snap = await db.collection('senceAttendance')
      .where('sessionOpen', '==', true)
      .get();

    if (snap.empty) {
      return toast('✅ No hay sesiones abiertas actualmente.', 'success');
    }

    const ahora = Date.now();
    const huerfanas = [];

    snap.docs.forEach(doc => {
      const a = doc.data();
      let esHuerfana = false;
      let razon = '';

      if (a.lastSeen) {
        const lastSeenMs = a.lastSeen.toDate ? a.lastSeen.toDate().getTime() : new Date(a.lastSeen).getTime();
        const diffMin = (ahora - lastSeenMs) / 60000;
        if (diffMin > TIMEOUT_MIN) {
          esHuerfana = true;
          razon = `Sin actividad hace ${Math.round(diffMin)} min`;
        }
      } else {
        // Sin lastSeen (sesiones antiguas pre-heartbeat): revisar inicioSesion
        if (a.inicioSesion) {
          const iniMs = a.inicioSesion.toDate ? a.inicioSesion.toDate().getTime() : new Date(a.inicioSesion).getTime();
          const diffMin = (ahora - iniMs) / 60000;
          if (diffMin > 120) { // más de 2 horas sin heartbeat = huérfana segura
            esHuerfana = true;
            razon = `Sin heartbeat, iniciada hace ${Math.round(diffMin)} min`;
          }
        }
      }

      if (esHuerfana) {
        huerfanas.push({ id: doc.id, data: a, razon });
      }
    });

    if (huerfanas.length === 0) {
      return toast(`✅ Todas las ${snap.size} sesión(es) abiertas están activas (heartbeat reciente).`, 'success', 5000);
    }

    const lista = huerfanas.map(h =>
      `• ${h.data.userName || h.data.userEmail || 'Alumno'} (${h.data.runAlumno || '?'}) — ${h.razon}`
    ).join('\n');

    if (!confirm(`Se encontraron ${huerfanas.length} sesión(es) huérfana(s):\n\n${lista}\n\n¿Cerrarlas en Firestore?\n(Esto NO cierra la sesión en SENCE — es solo registro interno)`)) {
      return;
    }

    const batch = db.batch();
    const ahora_ts = firebase.firestore.FieldValue.serverTimestamp();
    huerfanas.forEach(h => {
      batch.update(db.collection('senceAttendance').doc(h.id), {
        sessionOpen:  false,
        cierreSesion: ahora_ts,
        cierreAutomatico: true,
        cierreRazon: h.razon,
        updatedAt: ahora_ts
      });
    });

    await batch.commit();
    toast(`🧹 ${huerfanas.length} sesión(es) huérfana(s) cerradas correctamente.`, 'success', 6000);

    // Recargar la tabla
    setTimeout(() => navigate('attendance'), 800);

  } catch(e) {
    toast('❌ Error: ' + e.message, 'error');
  }
}

}

/* Genera contraseña desde RUT: últimos 4 dígitos del número */
function rutToPassword(rut) {
  const nums = rut.replace(/[^0-9]/g,'');
  return nums.length >= 6 ? nums.slice(-6) : nums.padEnd(6,'0');
}

/* Parsea una línea de la tabla pegada */
function parseBulkLine(line) {
  // Soporta TAB (Excel), punto y coma, o múltiples espacios como separador
  const parts = line.trim().split(/	|;|  +/);
  if (parts.length < 2) return null;
  // El RUT puede estar al final o al principio
  // Detectar cuál parte parece un RUT
  let nombre = '', rut = '';
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i].trim();
    if (/^\d{6,8}-?[\dkK]$/.test(p.replace(/\./g,''))) {
      rut = p.replace(/\./g,'');
      nombre = parts.filter((_,j)=>j!==i).join(' ').trim();
      break;
    }
  }
  if (!nombre || !rut) {
    // fallback: primera parte = nombre, segunda = RUT
    nombre = parts[0].trim();
    rut    = parts[1].trim().replace(/\./g,'');
  }
  // Asegurar formato correcto del RUT
  if (!rut.includes('-') && rut.length > 1) {
    rut = rut.slice(0,-1) + '-' + rut.slice(-1);
  }
  return { nombre, rut };
}

let _bulkAlumnos = [];

function previewBulk() {
  const text = document.getElementById('bulkTable').value.trim();
  if (!text) return toast('⚠️ Pega los datos primero.','warning');

  const lines = text.split('\n').filter(l => l.trim());
  _bulkAlumnos = [];
  const errors = [];

  lines.forEach((line, i) => {
    const parsed = parseBulkLine(line);
    if (!parsed) { errors.push(`Línea ${i+1}: no se pudo interpretar`); return; }
    if (!validarRut(parsed.rut)) {
      errors.push(`Línea ${i+1}: RUT inválido (${parsed.rut})`);
      return;
    }
    _bulkAlumnos.push(parsed);
  });

  const preview = document.getElementById('bulkPreview');
  const btn     = document.getElementById('btnBulkCreate');

  if (_bulkAlumnos.length === 0) {
    preview.innerHTML = `<div style="background:#fdecea;padding:12px;border-radius:8px;font-size:13px;color:#9b2335">
      ❌ No se encontraron datos válidos.<br>${errors.map(e=>`• ${escHtml(e)}`).join('<br>')}
    </div>`;
    btn.disabled = true;
    return;
  }

  btn.disabled = false;
  preview.innerHTML = `
    <div style="background:#eafaf1;padding:14px;border-radius:8px;margin-bottom:8px">
      <strong style="color:var(--success)">✅ ${_bulkAlumnos.length} alumno${_bulkAlumnos.length!==1?'s':''} listos para crear</strong>
      ${errors.length ? `<br><span style="color:var(--warning);font-size:12px">⚠️ ${errors.length} línea${errors.length!==1?'s':''} ignorada${errors.length!==1?'s':''}: ${errors.join(', ')}</span>` : ''}

      <table>
        <thead><tr><th>#</th><th>Nombre</th><th>RUT</th><th>Contraseña</th></tr></thead>
        <tbody>

            <td style="color:var(--text-light)">${i+1}</td>
            <td>${escHtml(a.nombre)}</td>
            <td><span style="font-family:'DM Mono'">${escHtml(a.rut)}</span></td>
            <td><span class="badge badge-orange" style="font-family:'DM Mono'">${escHtml(rutToPassword(a.rut))}</span></td>
          </tr>`).join('')}

      </table>
    </div>`;

async function crearAlumnosMasivo() {
  if (_bulkAlumnos.length === 0) return toast('⚠️ Previsualiza primero.','warning');

  const btn  = document.getElementById('btnBulkCreate');
  const prog = document.getElementById('bulkProgress');
  const bar  = document.getElementById('bulkBar');
  const stat = document.getElementById('bulkStatus');

  btn.disabled  = true;
  prog.style.display = 'block';

  let creados = 0, omitidos = 0, errores = 0;

  for (let i = 0; i < _bulkAlumnos.length; i++) {
    const a    = _bulkAlumnos[i];
    const pct  = Math.round(((i+1)/_bulkAlumnos.length)*100);
    bar.style.width = pct + '%';
    stat.textContent = `Procesando ${i+1}/${_bulkAlumnos.length}: ${a.nombre}...`;

    const email = rutToEmail(a.rut);
    const pass  = rutToPassword(a.rut);

    try {
      // Verificar si ya existe en Firestore
      const existing = await db.collection('users').where('rut','==',a.rut).limit(1).get();
      if (!existing.empty) { omitidos++; continue; }

      // Crear en Firebase Auth usando instancia secundaria
      const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: a.nombre });

      // Guardar en Firestore
      await db.collection('users').doc(cred.user.uid).set({
        uid:       cred.user.uid,
        email,
        name:      a.nombre,
        rut:       a.rut,
        role:      'student',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await secondaryAuth.signOut();
      creados++;
    } catch(e) {
      if (e.code === 'auth/email-already-in-use') { omitidos++; }
      else { errores++; console.warn('Error creando', a.nombre, e.message); }
    }
  }

  bar.style.width = '100%';
  stat.innerHTML = `<strong style="color:var(--success)">✅ Completado:</strong>
    ${creados} creados · ${omitidos} ya existían · ${errores} errores`;

  toast(`✅ ${creados} alumnos creados correctamente.`, 'success', 6000);
  _bulkAlumnos = [];
  document.getElementById('bulkTable').value = '';
  document.getElementById('bulkPreview').innerHTML = '';
  btn.disabled = true;

  // Recargar lista
  setTimeout(() => cargarListaAlumnos(), 1000);
}

async function crearAlumnoIndividual() {
  const nombre = document.getElementById('aa_nombre').value.trim();
  const rut    = document.getElementById('aa_rut').value.trim();
  if (!nombre) return toast('⚠️ Ingresa el nombre.','warning');
  if (!validarRut(rut)) return toast('⚠️ RUT inválido.','warning');

  const email = rutToEmail(rut);
  const pass  = rutToPassword(rut);

  try {
    const existing = await db.collection('users').where('rut','==',rut).limit(1).get();
    if (!existing.empty) return toast('⚠️ Este RUT ya está registrado.','warning');

    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: nombre });
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, email, name: nombre, rut,
      role: 'student',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await secondaryAuth.signOut();

    closeModal();
    toast(`✅ Alumno ${nombre} creado. Contraseña: ${pass}`, 'success', 6000);
    cargarListaAlumnos();
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') toast('⚠️ Este RUT ya tiene cuenta.','warning');
    else toast('❌ Error: ' + e.message,'error');
  }
}

async function resetPasswordAlumno(uid, rut, nombre) {
  const nuevaPass = prompt(`Nueva contraseña para ${nombre} (RUT: ${rut})\nDejar vacío para usar los 4 últimos dígitos del RUT:`) ?? '';
  const pass = nuevaPass.trim() || rutToPassword(rut);
  if (pass.length < 4) return toast('⚠️ La contraseña debe tener al menos 4 caracteres.','warning');

  try {
    // Firebase Admin SDK no está disponible en cliente.
    // Guardamos la nueva contraseña en Firestore para que el admin la recuerde,
    // y usamos la instancia secundaria para actualizar.
    await db.collection('users').doc(uid).update({
      passwordHint: pass,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast(`✅ Contraseña registrada: ${pass}. Para aplicarla, el alumno debe contactar al admin o se hace desde Firebase Console.`, 'success', 8000);
  } catch(e) {
    toast('❌ Error: ' + e.message,'error');
  }
}

/* Guarda la configuración en Firestore bajo config/sic */
async function guardarConfigSIC() {
  const cfg = leerFormSIC();
  if (!cfg.codigoOferta || cfg.codigoOferta.length < 7)
    return toast('⚠️ El Código Oferta es obligatorio (mínimo 7 caracteres).','warning');
  if (!cfg.codigoModulo || cfg.codigoModulo.length < 5)
    return toast('⚠️ El Código Módulo es obligatorio.','warning');
  if (!cfg.fechaInicio || !cfg.fechaFin)
    return toast('⚠️ Las fechas de inicio y fin son obligatorias.','warning');

  try {
    await db.collection('config').doc('sic').set({
      ...cfg,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: currentUser.uid
    });
    toast('✅ Configuración SIC guardada.','success');
    const st = document.getElementById('sic_config_status');
    if (st) st.innerHTML = `<span class="badge badge-green">✅ Config guardada correctamente</span>`;
  } catch(e) {
    toast('❌ Error al guardar: ' + e.message,'error');
  }
}

/* Lee los campos del formulario SIC */

  return {
    codigoOferta:  (document.getElementById('sic_codigoOferta')?.value || '').trim(),
    codigoGrupo:   (document.getElementById('sic_codigoGrupo')?.value  || '').trim(),
    codigoModulo:  (document.getElementById('sic_codigoModulo')?.value  || '').trim(),
    codigoEnvio:   (document.getElementById('sic_codigoEnvio')?.value  || '').trim() || 'INASEP-001',
    fechaInicio:   document.getElementById('sic_fechaInicio')?.value || '',
    fechaFin:      document.getElementById('sic_fechaFin')?.value || '',
    cantSinc:      parseInt(document.getElementById('sic_cantSinc')?.value  || '1'),
    cantAsinc:     parseInt(document.getElementById('sic_cantAsinc')?.value || '0'),
  };
}

/* Carga la configuración guardada y la pone en el formulario */
async function cargarConfigSIC() {
  try {
    const doc = await db.collection('config').doc('sic').get();
    if (!doc.exists) return;
    const d = doc.data();
    const set = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.value = val; };
    set('sic_codigoOferta', d.codigoOferta);
    set('sic_codigoGrupo',  d.codigoGrupo || d.codigoOferta);
    set('sic_codigoModulo', d.codigoModulo);
    set('sic_codigoEnvio',  d.codigoEnvio);
    set('sic_fechaInicio',  d.fechaInicio);
    set('sic_fechaFin',     d.fechaFin);
    set('sic_cantSinc',     d.cantSinc ?? 1);
    set('sic_cantAsinc',    d.cantAsinc ?? 0);
    const st = document.getElementById('sic_config_status');
    if (st && d.updatedAt) {
      st.innerHTML = `<span class="badge badge-blue">📅 Config cargada · ${fmtDateTime(d.updatedAt)}</span>`;
    }
  } catch(e) { /* sin config aún, no pasa nada */ }
}

/* Construye el payload JSON para el SIC según el manual */
async function construirPayloadSIC() {
  const cfg = leerFormSIC();
  if (!cfg.codigoOferta || !cfg.codigoModulo || !cfg.fechaInicio || !cfg.fechaFin) {
    toast('⚠️ Completa y guarda la configuración primero.','warning');
    return null;
  }

  // Obtener todos los registros de asistencia con sesión cerrada
  const snap = await db.collection('senceAttendance').get();
  const registros = snap.docs.map(d => d.data()).filter(a => a.runAlumno);

  if (registros.length === 0) {
    toast('⚠️ No hay alumnos con registros de asistencia.','warning');
    return null;
  }

  // Agrupar por RUN (puede haber múltiples sesiones del mismo alumno)
  const porAlumno = {};
  registros.forEach(a => {
    const run = a.runAlumno.replace(/\./g,'');
    const partes = run.split('-');
    const rutNum = partes[0];
    const dv     = partes[1] || '0';
    if (!porAlumno[run]) {
      porAlumno[run] = { rutNum, dv, segundos: 0, nombre: a.userName || '' };
    }
    // Calcular segundos de esta sesión
    if (a.inicioSesion && a.cierreSesion) {
      const ini = a.inicioSesion.toDate ? a.inicioSesion.toDate() : new Date(a.inicioSesion);
      const fin = a.cierreSesion.toDate  ? a.cierreSesion.toDate() : new Date(a.cierreSesion);
      const seg = Math.max(0, Math.floor((fin - ini) / 1000));
      porAlumno[run].segundos += seg;
    } else if (a.inicioSesion && !a.cierreSesion && a.sessionOpen) {
      // Sesión aún abierta: contar hasta ahora
      const ini = a.inicioSesion.toDate ? a.inicioSesion.toDate() : new Date(a.inicioSesion);
      const seg = Math.max(0, Math.floor((Date.now() - ini) / 1000));
      porAlumno[run].segundos += seg;
    }
  });

  const hoy = new Date().toISOString().slice(0,10);

  const listaAlumnos = Object.values(porAlumno).map(al => ({
    rutAlumno:           al.rutNum,
    dvAlumno:            al.dv,
    tiempoConectividad:  Math.max(1, al.segundos),
    porcentajeAvance:    0,  // según doc de pruebas: mantener en 0
    estado:              1,  // 1 = cursando
    fechaInicio:         cfg.fechaInicio,
    fechaFin:            cfg.fechaFin,
    fechaEjecucion:      hoy,
    listaModulos: [{
      codigoModulo:            cfg.codigoModulo,
      tiempoConectividad:      Math.max(1, al.segundos),
      porcentajeAvance:        0,
      estado:                  1,
      fechaInicio:             cfg.fechaInicio,
      fechaFin:                cfg.fechaFin,
      cantActividadSincronica: cfg.cantSinc,
      cantActividadAsincronica:cfg.cantAsinc,
      listaActividades:        [{ codigoActividad: 'Clase en Vivo INASEP' }]
    }]
  }));

  return {
    // RutOtec y token los agrega el Worker desde sus secrets
    idSistema:               1350,
    codigoOferta:            cfg.codigoOferta,
    codigoGrupo:             cfg.codigoGrupo || cfg.codigoOferta,
    codigoEnvio:             cfg.codigoEnvio || 'INASEP-001',
    cantActividadSincronica: cfg.cantSinc,
    cantActividadAsincronica:cfg.cantAsinc,
    listaAlumnos
  };
}

/* Previsualizar el JSON antes de enviar */
async function previewSIC() {
  const payload = await construirPayloadSIC();
  if (!payload) return;

  const area = document.getElementById('sic_preview_area');
  const pre  = document.getElementById('sic_json_preview');
  if (area && pre) {
    pre.textContent = JSON.stringify(payload, null, 2);
    area.style.display = 'block';
    area.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
  toast('👁️ JSON generado. Revísalo antes de enviar.','info');
}

/* Enviar al SIC via Worker */
async function enviarSIC() {
  const payload = await construirPayloadSIC();
  if (!payload) return;

  if (!confirm(`¿Confirmas enviar el avance de ${payload.listaAlumnos.length} alumno(s) al SIC?\n\nEsta acción es permanente y no se puede deshacer.`)) return;

  const btnEnviar = document.querySelector('button[onclick="enviarSIC()"]');
  if (btnEnviar) { btnEnviar.disabled = true; btnEnviar.textContent = '⏳ Enviando...'; }

  const resultEl = document.getElementById('sic_resultado');

  try {
    toast('🔄 Enviando datos al SIC...','info',5000);

    const res = await fetch(WORKER_URL + '/api/sic/enviarAvance', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Worker-Secret': WORKER_SECRET
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    const hoy  = new Date().toISOString().slice(0,10);
    const ok   = res.ok && !data.error;

    // Guardar en historial local
    await db.collection('sicEnvios').add({
      fecha:        hoy,
      createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
      createdBy:    currentUser.uid,
      cantAlumnos:  payload.listaAlumnos.length,
      codigoOferta: payload.codigoOferta,
      resultado:    ok ? 'Exitoso' : 'Error',
      respuesta:    JSON.stringify(data).slice(0, 2000),
      payload:      JSON.stringify(payload).slice(0, 5000)
    });

    if (resultEl) {
      resultEl.style.display = 'block';
      if (ok) {
        resultEl.innerHTML = `
          <div style="background:#eafaf1;border:2px solid var(--success);border-radius:10px;padding:16px">
            <div style="font-weight:700;color:var(--success);font-size:15px;margin-bottom:8px">✅ Envío exitoso al SIC</div>
            <pre style="font-size:11px;color:var(--text-mid);white-space:pre-wrap;margin:0">${escHtml(JSON.stringify(data, null, 2))}</pre>
          </div>`;
        toast('✅ Avance enviado correctamente al SIC.','success',6000);
        // Actualizar estado
        const estEl = document.getElementById('sic_estado_envio');
        if (estEl) estEl.textContent = '✅ Ya enviado hoy';
      } else {
        resultEl.innerHTML = `
          <div style="background:#fdecea;border:2px solid var(--danger);border-radius:10px;padding:16px">
            <div style="font-weight:700;color:var(--danger);font-size:15px;margin-bottom:8px">❌ Error en el envío</div>
            <pre style="font-size:11px;color:#7b1a1a;white-space:pre-wrap;margin:0">${escHtml(JSON.stringify(data, null, 2))}</pre>
          </div>`;
        toast('❌ Error en el envío. Revisa la respuesta del SIC.','error',8000);
      }
    }

    await cargarHistorialSIC();

  } catch(e) {
    toast('❌ Error de conexión: ' + e.message,'error');
    if (resultEl) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<div style="background:#fdecea;border:2px solid var(--danger);border-radius:10px;padding:14px;color:var(--danger)">❌ ${escHtml(e.message)}</div>`;
    }
  } finally {
    if (btnEnviar) { btnEnviar.disabled = false; btnEnviar.textContent = '📤 Enviar Avance al SIC'; }
  }
}

    const snap = await db.collection('users').where('role','==','teacher').orderBy('name').get();
    if (snap.empty) {
      cont.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No hay profesores registrados aún.</p></div>';
      return;
    }
    cont.innerHTML = `
      <div style="margin-bottom:10px;font-size:13px;color:var(--text-light)">
        Total: <strong>${snap.size} profesor${snap.size!==1?'es':''}</strong>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>RUT</th><th>Email interno</th><th>Contraseña</th><th>Acciones</th></tr></thead>
          <tbody>
            ${snap.docs.map(d => {
              const u = d.data();
              const pass = rutToPassword(u.rut || '');
              return `<tr>
                <td><div style="display:flex;align-items:center;gap:8px">
                  <div class="participant-avatar" style="background:var(--warning)">${(u.name||'?').slice(0,2).toUpperCase()}</div>
                  <strong>${escHtml(u.name||'—')}</strong>
                </div></td>
                <td><span style="font-family:'DM Mono';font-size:13px">${escHtml(u.rut||'—')}</span></td>
                <td><span style="font-size:11px;color:var(--text-light)">${escHtml(u.email||'—')}</span></td>
                <td><span class="badge badge-orange" style="font-family:'DM Mono'">${escHtml(pass)}</span></td>
                <td>
                  <button class="btn btn-sm btn-danger" onclick="eliminarProfesor('${d.id}','${escHtml(u.name||'')}')">🗑️</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    cont.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

function showAgregarProfesor() {
  openModal(`
    <h3>➕ Agregar Profesor</h3>
    <div class="form-group">
      <label>Nombre Completo *</label>
      <input type="text" id="ap_nombre" placeholder="Ej: María González Fuentes">
    </div>
    <div class="form-group">
      <label>RUT (sin puntos, con guión) *</label>
      <input type="text" id="ap_rut" placeholder="Ej: 12345678-9" maxlength="12"
             style="font-family:'DM Mono';font-size:15px;letter-spacing:1px"
             oninput="formatRutInput(this)">
      <small>La contraseña inicial será los últimos 6 dígitos del RUT. El profesor puede cambiarla contactando al administrador.</small>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary"   onclick="crearProfesor()">✅ Crear Profesor</button>
    </div>`);
}

async function crearProfesor() {
  const nombre = document.getElementById('ap_nombre').value.trim();
  const rut    = document.getElementById('ap_rut').value.trim();
  if (!nombre) return toast('⚠️ Ingresa el nombre.','warning');
  if (!validarRut(rut)) return toast('⚠️ RUT inválido.','warning');

  const email = rutToEmail(rut);
  const pass  = rutToPassword(rut);

  try {
    const existing = await db.collection('users').where('rut','==',rut).limit(1).get();
    if (!existing.empty) return toast('⚠️ Este RUT ya está registrado.','warning');

    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: nombre });
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, email, name: nombre, rut,
      role: 'teacher',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await secondaryAuth.signOut();

    closeModal();
    toast(`✅ Profesor ${nombre} creado. Contraseña inicial: ${pass}`, 'success', 7000);
    cargarListaProfesores();
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') toast('⚠️ Este RUT ya tiene cuenta.','warning');
    else toast('❌ Error: ' + e.message,'error');
  }
}

async function eliminarProfesor(uid, nombre) {
  if (!confirm(`¿Eliminar al profesor "${nombre}"? Solo se elimina de Firestore, no de Authentication.`)) return;
  try {
    await db.collection('users').doc(uid).delete();
    toast(`🗑️ ${nombre} eliminado.`,'success');
    cargarListaProfesores();
  } catch(e) {
    toast('❌ Error: ' + e.message,'error');
  }
}

/* ════════════════════════════════════════════════
   VISTA: SALA DEL PROFESOR (Teacher Room)
   ─────────────────────────────────────────────
   Al entrar: registra su presencia y activa clase.
   Muestra alumnos en tiempo real + tiempo docencia.
   Al salir: registra salida.
════════════════════════════════════════════════ */
let _teacherSessionDocId = null;
let _teacherClassTimer   = null;
let _teacherRTListener   = null;
let _teacherClassStart   = null;

async function renderTeacherRoom(mc, params={}) {
  const classId = params.id;
  if (!classId) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }

  const doc = await db.collection('liveClasses').doc(classId).get();
  if (!doc.exists) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }
  const cls = doc.data();

  const teacherName = currentUser.displayName || currentUser.email.split('@')[0];
  const duracionMin = cls.duration || 60;
  const duracionSeg = duracionMin * 60;

  // Construir embed del video
  let videoEmbed = '';
  if (cls.videoUrl) {
    let embedUrl = cls.videoUrl;
    if (cls.videoType === 'youtube') {
      const ytMatch = cls.videoUrl.match(/(?:v=|youtu\.be\/)([^&?]+)/);
      if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0`;
    } else if (cls.videoType === 'jitsi' && cls.jitsiRoom) {
      embedUrl = `https://meet.jit.si/${encodeURIComponent(cls.jitsiRoom)}#config.startWithAudioMuted=false`;
    }
    videoEmbed = `<iframe class="video-frame" src="${escHtml(embedUrl)}" allow="camera;microphone;fullscreen;display-capture;autoplay" allowfullscreen></iframe>`;
  } else {
    videoEmbed = `<div class="video-placeholder"><div class="icon">📡</div><p>El enlace de videoconferencia aún no está disponible.</p></div>`;
  }

  mc.innerHTML = `
    <div class="page-header">
      <div>
        <h2>👨‍🏫 ${escHtml(cls.title)}</h2>
        <div class="breadcrumb"><a onclick="salirseDeSala()">← Mis Clases</a> › Vista Profesor</div>
      </div>
      ${cls.status==='active' ? '<span class="badge badge-live">🔴 EN VIVO</span>' : ''}
    </div>

    <!-- CRONÓMETRO DOCENCIA -->
    <div class="session-timer" id="teacherTimerBox">
      <div>
        <div class="timer-label">⏱ Tiempo de Docencia</div>
        <div class="timer-display" id="teacherTimerDisplay">00:00:00</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">Tiempo que llevas en esta sesión</div>
      </div>
      <div style="text-align:right">
        <div class="timer-label">Duración Total</div>
        <div style="font-size:22px;font-family:'DM Mono';color:var(--green-100)">${duracionMin} min</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px" id="teacherTimeCoverage">Calculando...</div>
      </div>
    </div>

    <!-- ESTADO CLASE -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <h3>📊 Estado de la Clase en Tiempo Real</h3>
        <button class="btn btn-sm btn-secondary" onclick="recargarAlumnosRTDB('${classId}')">🔄 Actualizar</button>
      </div>
      <div id="teacherAlumnosRT">
        <div class="empty-state"><div class="icon">⏳</div><p>Cargando alumnos...</p></div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div class="video-room">${videoEmbed}</div>
    </div>

    <!-- BOTÓN SALIR -->
    <div style="margin-bottom:24px">
      <button class="btn btn-danger" onclick="salirseDeSala()">🚪 Salir de la Sala (registra salida)</button>
    </div>`;

  // 1. Registrar entrada del profesor en teacherSessions
  await registrarEntradaProfesor(classId, cls, teacherName);

  // 2. Marcar clase como con profesor activo
  await db.collection('liveClasses').doc(classId).update({
    teacherActive: true,
    teacherUid: currentUser.uid,
    teacherName: teacherName,
    teacherEnteredAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  // 3. Iniciar cronómetro local
  _teacherClassStart = Date.now();
  _teacherClassTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - _teacherClassStart) / 1000);
    const hh = String(Math.floor(elapsed/3600)).padStart(2,'0');
    const mm = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
    const ss = String(elapsed%60).padStart(2,'0');
    const el = document.getElementById('teacherTimerDisplay');
    if (el) el.textContent = `${hh}:${mm}:${ss}`;
    const cov = document.getElementById('teacherTimeCoverage');
    if (cov) {
      const pct = Math.min(100, Math.round((elapsed/duracionSeg)*100));
      cov.textContent = `${pct}% del tiempo cubierto`;
      cov.style.color = pct >= 100 ? '#27ae60' : 'rgba(255,255,255,0.45)';
    }
  }, 1000);

  // 4. Escuchar alumnos en tiempo real
  cargarAlumnosEnVivoProfesor(classId);
}

async function registrarEntradaProfesor(classId, cls, teacherName) {
  try {
    const sesRef = await db.collection('teacherSessions').add({
      classId,
      classTitle: cls.title,
      teacherUid:  currentUser.uid,
      teacherName: teacherName,
      entradaAt:   firebase.firestore.FieldValue.serverTimestamp(),
      salidaAt:    null,
      duracionSeg: null,
      createdAt:   firebase.firestore.FieldValue.serverTimestamp()
    });
    _teacherSessionDocId = sesRef.id;
    toast(`✅ Entrada registrada. ¡Bienvenido, ${teacherName}!`, 'success', 4000);
  } catch(e) {
    toast('⚠️ No se pudo registrar entrada: ' + e.message, 'warning');
  }
}

async function salirseDeSala() {
  // Detener cronómetro
  if (_teacherClassTimer) { clearInterval(_teacherClassTimer); _teacherClassTimer = null; }
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener = null; }

  // Registrar salida
  if (_teacherSessionDocId) {
    const duracionSeg = _teacherClassStart ? Math.floor((Date.now() - _teacherClassStart)/1000) : 0;
    try {
      await db.collection('teacherSessions').doc(_teacherSessionDocId).update({
        salidaAt:    firebase.firestore.FieldValue.serverTimestamp(),
        duracionSeg: duracionSeg
      });
    } catch(e) { console.warn('Error registrando salida:', e); }
    _teacherSessionDocId = null;
    _teacherClassStart   = null;
  }

  // Marcar clase sin profesor activo (solo si sigue siendo el mismo)
  // (No actualizamos status para no afectar el flujo de alumnos)
  try {
    const classSnap = await db.collection('liveClasses').where('teacherUid','==',currentUser.uid).get();
    for (const d of classSnap.docs) {
      await d.ref.update({ teacherActive: false, teacherLeftAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
  } catch(e) { /* silencioso */ }

  toast('🚪 Salida registrada.', 'info');
  navigate('live-classes');
}

function cargarAlumnosEnVivoProfesor(classId) {
  const cont = document.getElementById('teacherAlumnosRT');
  if (!cont) return;

  // Suscripción en tiempo real
  if (_teacherRTListener) _teacherRTListener();
  _teacherRTListener = db.collection('senceAttendance')
    .where('classId','==',classId)
    .onSnapshot(snap => {
      const cont2 = document.getElementById('teacherAlumnosRT');
      if (!cont2) { if(_teacherRTListener){_teacherRTListener();_teacherRTListener=null;} return; }

      if (snap.empty) {
        cont2.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Ningún alumno ha iniciado sesión SENCE aún.</p></div>';
        return;
      }

      const abiertos = snap.docs.filter(d => d.data().sessionOpen === true).length;
      cont2.innerHTML = `
        <div style="margin-bottom:12px;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--text-mid)">Total registros: <strong>${snap.size}</strong></span>
          <span class="badge badge-green">🟢 Sesiones abiertas: ${abiertos}</span>
          <span class="badge badge-gray">🔴 Cerradas: ${snap.size - abiertos}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Alumno</th><th>RUN</th><th>Estado SENCE</th><th>Inicio Sesión</th><th>Última actividad</th></tr></thead>
            <tbody>
              ${snap.docs.map(d => {
                const a = d.data();
                const open = a.sessionOpen === true;
                return `<tr class="participant-row">
                  <td><div style="display:flex;align-items:center;gap:8px">
                    <div class="participant-avatar">${(a.userName||'?').slice(0,2).toUpperCase()}</div>
                    <span>${escHtml(a.userName||a.userEmail||'—')}</span>
                  </div></td>
                  <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(a.runAlumno||'—')}</span></td>
                  <td><span class="badge ${open?'badge-green':'badge-gray'}">${open?'✅ Abierta':'⛔ Cerrada'}</span></td>
                  <td style="font-size:12px">${fmtDateTime(a.inicioSesion)}</td>
                  <td style="font-size:12px">${a.lastSeen ? fmtDateTime(a.lastSeen) : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }, err => {
      const cont2 = document.getElementById('teacherAlumnosRT');
      if (cont2) cont2.innerHTML = `<p style="color:var(--danger);padding:12px">${err.message}</p>`;
    });
}

function recargarAlumnosRTDB(classId) {
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener = null; }
  cargarAlumnosEnVivoProfesor(classId);
}

/* ════════════════════════════════════════════════
   VISTA: MI ASISTENCIA COMO PROFESOR (Teacher)
   Muestra historial de sesiones del profesor + 
   alumnos conectados en sus clases.
════════════════════════════════════════════════ */
async function renderTeacherAttendance(mc) {
  mc.innerHTML = `
    <div class="page-header">
      <div><h2>👥 Asistencia — Mis Clases</h2>
      <div class="breadcrumb">Registro de docencia y alumnos conectados</div></div>
    </div>

    <div class="card">
      <div class="card-header"><h3>🕐 Mi Historial de Docencia</h3></div>
      <div id="teacherHistorial"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
    </div>

    <div class="card">
      <div class="card-header"><h3>👨‍🎓 Alumnos en mis Clases</h3></div>
      <div id="teacherAlumnosHist"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
    </div>`;

  // Mis sesiones de docencia
  try {
    const snap = await db.collection('teacherSessions')
      .where('teacherUid','==',currentUser.uid)
      .orderBy('createdAt','desc').limit(50).get();

    const cont = document.getElementById('teacherHistorial');
    if (!cont) return;

    if (snap.empty) {
      cont.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Aún no has entrado a ninguna clase.</p></div>';
    } else {
      let totalSeg = 0;
      snap.docs.forEach(d => { totalSeg += d.data().duracionSeg || 0; });
      const hh = String(Math.floor(totalSeg/3600)).padStart(2,'0');
      const mm = String(Math.floor((totalSeg%3600)/60)).padStart(2,'0');

      cont.innerHTML = `
        <div style="margin-bottom:12px;font-size:13px;color:var(--text-mid)">
          Total docencia acumulada: <strong style="color:var(--primary)">${hh}h ${mm}m</strong>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Clase</th><th>Entrada</th><th>Salida</th><th>Duración</th></tr></thead>
            <tbody>
              ${snap.docs.map(d => {
                const s = d.data();
                const dur = s.duracionSeg ? `${Math.floor(s.duracionSeg/60)}m ${s.duracionSeg%60}s` : '(en curso)';
                return `<tr>
                  <td>${escHtml(s.classTitle||'—')}</td>
                  <td style="font-size:12px">${fmtDateTime(s.entradaAt)}</td>
                  <td style="font-size:12px">${s.salidaAt ? fmtDateTime(s.salidaAt) : '<span class="badge badge-live">Activa</span>'}</td>
                  <td><strong>${dur}</strong></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }
  } catch(e) {
    const cont = document.getElementById('teacherHistorial');
    if (cont) cont.innerHTML = `<p style="color:var(--danger);padding:12px">${e.message}</p>`;
  }

  // Alumnos de mis clases (todas las sesiones SENCE donde yo fui el teacher)
  try {
    // Obtener IDs de clases donde he sido profesor
    const sesSnap = await db.collection('teacherSessions')
      .where('teacherUid','==',currentUser.uid).get();
    const classIds = [...new Set(sesSnap.docs.map(d => d.data().classId))];
    const cont2 = document.getElementById('teacherAlumnosHist');
    if (!cont2) return;

    if (classIds.length === 0) {
      cont2.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Sin clases aún.</p></div>';
      return;
    }

    // Firestore permite max 10 en where-in
    const idsChunk = classIds.slice(0, 10);
    const attSnap = await db.collection('senceAttendance')
      .where('classId','in', idsChunk)
      .orderBy('createdAt','desc').get();

    if (attSnap.empty) {
      cont2.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Sin registros de alumnos aún.</p></div>';
      return;
    }

    cont2.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Alumno</th><th>RUN</th><th>Clase</th><th>Estado SENCE</th><th>Inicio</th></tr></thead>
          <tbody>
            ${attSnap.docs.map(d => {
              const a = d.data();
              return `<tr>
                <td>${escHtml(a.userName||a.userEmail||'—')}</td>
                <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(a.runAlumno||'—')}</span></td>
                <td>${escHtml(a.classTitle||'—')}</td>
                <td><span class="badge ${a.sessionOpen?'badge-green':'badge-gray'}">${a.sessionOpen?'✅ Abierta':'🏁 Cerrada'}</span></td>
                <td style="font-size:12px">${fmtDateTime(a.inicioSesion)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    const cont2 = document.getElementById('teacherAlumnosHist');
    if (cont2) cont2.innerHTML = `<p style="color:var(--danger);padding:12px">${e.message}</p>`;
  }
}
