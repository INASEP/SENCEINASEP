<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>INASEP SENCE - Clases en Vivo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a8c5c">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@7.7.2/tinymce.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Sora', sans-serif; background: #f4f7f5; color: #1a2e1e; line-height: 1.5; }
        :root {
            --green-900: #0d1f14; --green-800: #142a1b; --primary: #4a8c5c;
            --primary-dark: #3d7a4e; --bg: #f4f7f5; --card-bg: #ffffff;
            --border: #d6e8da; --success: #27ae60; --danger: #c0392b;
        }
        /* Login */
        .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green-900); }
        .auth-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 430px; text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.35); }
        .auth-logo img { max-height: 80px; margin-bottom: 20px; }
        .brand { font-size: 13px; color: #4a6651; text-transform: uppercase; margin-top: 6px; }
        /* Dashboard */
        .dashboard { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--green-900); position: fixed; top:0; left:0; bottom:0; z-index:200; }
        .sidebar-top { padding: 22px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-top img { height: 44px; }
        .sidebar-nav a { display: block; padding: 11px 20px; color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.2s; }
        .sidebar-nav a.active, .sidebar-nav a:hover { background: rgba(74,140,92,0.3); color: #fff; }
        .main-wrapper { margin-left: 260px; flex:1; }
        .topbar { background: #fff; padding: 12px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .main-content { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-warning { background: #e67e22; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 22px 24px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }
        .course-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .course-card .card-body { padding: 16px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; background: #e6f9ee; color: #1a7a3a; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none; }
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .justify-center { justify-content: center; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 12px; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.2s; }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .mob-menu-btn { display: block; background: var(--green-900); color: #fff; border: none; padding: 8px 12px; border-radius: 8px; }
        }
        .mob-menu-btn { display: none; }
    </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash" style="position:fixed; inset:0; background:var(--green-900); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <img src="logo.png" style="width:80px;"> Cargando...
</div>

<!-- SECCIÓN LOGIN -->
<div id="authSection" class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo"><img src="logo.png"><div class="brand">Instituto Nacional de Seguridad Privada</div></div>
        <div id="alertAuth" class="alert" style="display:none; background:#fdecea; color:#c0392b; padding:10px; border-radius:8px; margin-bottom:15px;"></div>
        <div id="loginForm">
            <h2 style="margin-bottom:20px;">Iniciar Sesión</h2>
            <div class="form-group"><label>Correo electrónico</label><input type="email" id="loginEmail" placeholder="correo@ejemplo.com"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%;" onclick="login()">Ingresar</button>
        </div>
    </div>
</div>

<!-- SECCIÓN DASHBOARD -->
<div id="dashboardSection" class="dashboard hidden">
    <div class="mob-overlay" id="mobOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-top"><img src="logo.png"><div class="info"><h3 style="color:#fff;">INASEP</h3><span id="sidebarRole" class="badge"></span></div></div>
        <div class="sidebar-user" style="padding:12px 20px; color:rgba(255,255,255,0.7);"><div id="sidebarName"></div><div id="sidebarEmail" style="font-size:12px;"></div></div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer" style="padding:20px;"><button class="btn btn-sm" style="width:100%; background:#2c3e2b;" onclick="logout()">Cerrar Sesión</button></div>
    </div>
    <div class="main-wrapper">
        <div class="topbar"><button class="mob-menu-btn" onclick="openSidebar()">☰</button><span class="topbar-title" id="topbarTitle"></span><div class="topbar-user"><span id="topbarName"></span></div></div>
        <div class="main-content" id="mainContent">Cargando...</div>
    </div>
</div>
<div id="modalContainer"></div>

<script>
    // ==================== CONFIGURACIÓN FIREBASE (REEMPLAZAR) ====================
   const firebaseConfig = {
  apiKey: "AIzaSyAqwDK_8M6KCYSG2oCuYc6Z8ErlaKrs_kE",
  authDomain: "lms-sence.firebaseapp.com",
  projectId: "lms-sence",
  storageBucket: "lms-sence.firebasestorage.app",
  messagingSenderId: "650163867290",
  appId: "1:650163867290:web:60a7b47c07d876c5fd1923"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentRole = null;
    let currentRoute = '';

    // ==================== AUTENTICACIÓN ====================
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                currentRole = userDoc.data().role;
            } else {
                currentRole = 'student';
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    role: 'student',
                    enrolledCourses: []
                });
            }
            showDashboard();
        } else {
            currentUser = null;
            currentRole = null;
            showAuth();
        }
        document.getElementById('splash')?.remove();
    });

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        if (!email || !pass) return showAlert('Complete todos los campos');
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(e) { showAlert('Error: ' + e.message); }
    }
    function showAlert(msg) {
        const el = document.getElementById('alertAuth');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    function toast(msg, type='error') {
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.cssText = `position:fixed; bottom:20px; right:20px; background:${type==='success'?'#27ae60':'#c0392b'}; color:#fff; padding:12px 20px; border-radius:8px; z-index:9999;`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    async function logout() { await auth.signOut(); window.location.hash = ''; showAuth(); }
    function showAuth() { document.getElementById('authSection').classList.remove('hidden'); document.getElementById('dashboardSection').classList.add('hidden'); }
    function showDashboard() { document.getElementById('authSection').classList.add('hidden'); document.getElementById('dashboardSection').classList.remove('hidden'); updateSidebar(); handleRoute(); }

    // ==================== SIDEBAR Y ROUTER ====================
    function updateSidebar() {
        const nav = document.getElementById('sidebarNav');
        const roleBadge = document.getElementById('sidebarRole');
        document.getElementById('sidebarName').innerText = currentUser.displayName || currentUser.email;
        document.getElementById('sidebarEmail').innerText = currentUser.email;
        document.getElementById('topbarName').innerHTML = currentUser.displayName || currentUser.email.split('@')[0];
        if (currentRole === 'admin') {
            roleBadge.innerText = 'Admin';
            nav.innerHTML = `<a href="#welcome" data-route="welcome">🏠 Inicio</a><a href="#admin/courses" data-route="admin/courses">📁 Cursos</a><a href="#admin/students" data-route="admin/students">👥 Alumnos</a><a href="#admin/teachers" data-route="admin/teachers">👨‍🏫 Profesores</a><a href="#admin/results" data-route="admin/results">📊 Resultados</a>`;
        } else if (currentRole === 'teacher') {
            roleBadge.innerText = 'Profesor';
            nav.innerHTML = `<a href="#welcome" data-route="welcome">🏠 Inicio</a><a href="#teacher/courses" data-route="teacher/courses">📚 Mis Cursos</a>`;
        } else {
            roleBadge.innerText = 'Alumno';
            nav.innerHTML = `<a href="#welcome" data-route="welcome">🏠 Inicio</a><a href="#student/courses" data-route="student/courses">📚 Mis Cursos</a><a href="#student/results" data-route="student/results">📊 Mis Resultados</a>`;
        }
    }
    window.addEventListener('hashchange', handleRoute);
    function handleRoute() {
        const hash = window.location.hash.replace('#','').split('?')[0] || (currentRole==='admin'?'admin/courses':(currentRole==='teacher'?'teacher/courses':'student/courses'));
        currentRoute = hash;
        closeModal();
        closeSidebar();
        const main = document.getElementById('mainContent');
        if (!currentUser) return;
        if (currentRole === 'admin') {
            if (hash === 'welcome') renderWelcome(main);
            else if (hash === 'admin/courses') renderAdminCourses(main);
            else if (hash === 'admin/students') renderAdminStudents(main);
            else if (hash === 'admin/teachers') renderAdminTeachers(main);
            else if (hash === 'admin/results') renderAdminResults(main);
            else if (hash.match(/^admin\/courses\/([^/]+)$/)) renderAdminCourseDetail(main, RegExp.$1);
            else main.innerHTML = '<div class="card">Página no encontrada</div>';
        } else if (currentRole === 'teacher') {
            if (hash === 'welcome') renderWelcome(main);
            else if (hash === 'teacher/courses') renderTeacherCourses(main);
            else if (hash.match(/^teacher\/courses\/([^/]+)$/)) renderTeacherCourseDetail(main, RegExp.$1);
            else main.innerHTML = '<div class="card">Página no encontrada</div>';
        } else {
            if (hash === 'welcome') renderWelcome(main);
            else if (hash === 'student/courses') renderStudentCourses(main);
            else if (hash === 'student/results') renderStudentResults(main);
            else if (hash.match(/^student\/courses\/([^/]+)$/)) renderStudentCourseDetail(main, RegExp.$1);
            else main.innerHTML = '<div class="card">Página no encontrada</div>';
        }
        document.getElementById('topbarTitle').innerText = hash.replace(/\//g,' › ');
    }
    function navigate(route) { window.location.hash = route; }
    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('mobOverlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobOverlay').classList.remove('active'); }
    function openModal(html) { document.getElementById('modalContainer').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    // ==================== ADMIN - CURSOS ====================
    async function renderAdminCourses(container) {
        const snap = await db.collection('courses').get();
        const docs = snap.docs.sort((a,b)=> (b.data().createdAt?.toMillis()||0)-(a.data().createdAt?.toMillis()||0));
        container.innerHTML = `<div class="page-header"><h2>📁 Cursos</h2><button class="btn btn-primary" onclick="showCreateCourseModal()">+ Nuevo Curso</button></div><div class="grid" id="coursesGrid"></div>`;
        const grid = document.getElementById('coursesGrid');
        if (docs.length===0) grid.innerHTML = '<div class="card">No hay cursos</div>';
        else grid.innerHTML = docs.map(d=>`<div class="course-card" onclick="navigate('admin/courses/${d.id}')"><div class="card-body"><h4>${escapeHtml(d.data().title)}</h4><p>Profesor: ${escapeHtml(d.data().teacherName || 'No asignado')}</p><span class="badge">${d.data().senceEnabled?'SENCE activado':'Sin SENCE'}</span></div><div class="card-footer"><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();editCourse('${d.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteCourse('${d.id}')">🗑️</button></div></div>`).join('');
    }
    async function showCreateCourseModal(courseData=null) {
        const teachersSnap = await db.collection('users').where('role','==','teacher').get();
        const teacherOptions = teachersSnap.docs.map(d=>`<option value="${d.id}" ${courseData?.teacherId===d.id?'selected':''}>${escapeHtml(d.data().name)}</option>`).join('');
        openModal(`<h3>${courseData?'Editar':'Nuevo'} Curso</h3><div class="form-group"><label>Título</label><input type="text" id="courseTitle" value="${courseData?escapeHtml(courseData.title):''}"></div><div class="form-group"><label>Descripción</label><div id="quillDesc"></div></div><div class="form-group"><label>Profesor asignado</label><select id="teacherSelect">${teacherOptions}</select></div><div class="form-group"><label><input type="checkbox" id="senceEnabled" ${courseData?.senceEnabled?'checked':''}> Habilitar SENCE</label></div><div id="senceFields" style="${courseData?.senceEnabled?'':'display:none'}"><div class="form-group"><label>Código SENCE (10 dígitos)</label><input type="text" id="codigoSence" value="${courseData?.codigoSence||''}"></div><div class="form-group"><label>Código curso interno</label><input type="text" id="codigoCursoInterno" value="${courseData?.codigoCursoInterno||''}"></div><div class="form-group"><label>Línea capacitación (3)</label><input type="number" id="lineaCapacitacion" value="${courseData?.lineaCapacitacion||3}"></div><div class="form-group"><label>RUT OTEC</label><input type="text" id="rutOtec" value="${courseData?.rutOtec||''}"></div><div class="form-group"><label>Token SENCE</label><input type="password" id="tokenSence" value="${courseData?.tokenSence||''}"></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCourse('${courseData?.id||''}')">Guardar</button></div>`);
        setTimeout(()=>{ if(window.quill) window.quill.destroy(); window.quill = new Quill('#quillDesc',{theme:'snow'}); if(courseData?.description) window.quill.root.innerHTML=courseData.description; },100);
        document.getElementById('senceEnabled').addEventListener('change', (e) => { document.getElementById('senceFields').style.display = e.target.checked ? 'block' : 'none'; });
    }
    async function saveCourse(id) {
        const title = document.getElementById('courseTitle').value.trim();
        const description = window.quill ? window.quill.root.innerHTML : '';
        const teacherId = document.getElementById('teacherSelect').value;
        const teacherDoc = await db.collection('users').doc(teacherId).get();
        const teacherName = teacherDoc.exists ? teacherDoc.data().name : '';
        const senceEnabled = document.getElementById('senceEnabled').checked;
        let senceData = {};
        if (senceEnabled) {
            senceData = {
                codigoSence: document.getElementById('codigoSence').value.trim(),
                codigoCursoInterno: document.getElementById('codigoCursoInterno').value.trim(),
                lineaCapacitacion: parseInt(document.getElementById('lineaCapacitacion').value),
                rutOtec: document.getElementById('rutOtec').value.trim(),
                tokenSence: document.getElementById('tokenSence').value.trim()
            };
        }
        if(!title) return toast('Título requerido');
        const data = { title, description, teacherId, teacherName, senceEnabled, ...senceData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if(!id) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('courses').doc(id || Math.random().toString()).set(data, {merge:true});
        closeModal(); toast('Curso guardado','success'); handleRoute();
    }
    async function editCourse(id) { const d = await db.collection('courses').doc(id).get(); if(d.exists) showCreateCourseModal({id, ...d.data()}); }
    async function deleteCourse(id) { if(confirm('¿Eliminar?')) await db.collection('courses').doc(id).delete(); handleRoute(); }
    async function renderAdminCourseDetail(container, courseId) {
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        container.innerHTML = `<div class="page-header"><h2>${escapeHtml(course.title)}</h2><button class="btn btn-secondary" onclick="navigate('admin/courses')">← Volver</button></div><div class="card"><p>Profesor: ${escapeHtml(course.teacherName)}</p>${course.senceEnabled?'<span class="badge">SENCE activado</span>':''}</div><div class="card"><h3>Lecciones</h3><div id="lessonsList"></div><button class="btn btn-primary btn-sm" onclick="showCreateLessonModal('${courseId}')">+ Lección</button></div>`;
        const lessonsSnap = await db.collection('lessons').where('courseId','==',courseId).get();
        const lessons = lessonsSnap.docs.sort((a,b)=>(a.data().order||0)-(b.data().order||0));
        document.getElementById('lessonsList').innerHTML = lessons.map(l=>`<div class="flex justify-between"><span>${escapeHtml(l.data().title)}</span><button class="btn btn-sm btn-danger" onclick="deleteLesson('${l.id}','${courseId}')">🗑️</button></div>`).join('');
    }
    async function showCreateLessonModal(courseId) { toast('Crear lección: similar a versión anterior'); }
    async function deleteLesson(id, courseId) { await db.collection('lessons').doc(id).delete(); navigate('admin/courses/'+courseId); }

    // ADMIN - PROFESORES Y ALUMNOS
    async function renderAdminTeachers(container) {
        const snap = await db.collection('users').where('role','==','teacher').get();
        container.innerHTML = `<div class="page-header"><h2>👨‍🏫 Profesores</h2><button class="btn btn-primary" onclick="showCreateTeacherModal()">+ Nuevo Profesor</button></div><div class="card">${snap.docs.map(d=>`<div class="flex justify-between"><span>${escapeHtml(d.data().name)} (${d.data().email})</span><button class="btn btn-sm btn-danger" onclick="deleteTeacher('${d.id}')">🗑️</button></div>`).join('')}</div>`;
    }
    function showCreateTeacherModal() {
        openModal(`<h3>Nuevo Profesor</h3><div class="form-group"><label>Nombre</label><input type="text" id="teacherName"></div><div class="form-group"><label>Email</label><input type="email" id="teacherEmail"></div><div class="form-group"><label>Contraseña</label><input type="text" id="teacherPass"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveTeacher()">Crear</button></div>`);
    }
    async function saveTeacher() {
        const name = document.getElementById('teacherName').value.trim();
        const email = document.getElementById('teacherEmail').value.trim();
        const pass = document.getElementById('teacherPass').value;
        if(!name||!email||!pass) return toast('Complete todo');
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        await db.collection('users').doc(cred.user.uid).set({ uid: cred.user.uid, name, email, role: 'teacher' });
        closeModal(); toast('Profesor creado','success'); handleRoute();
    }
    async function deleteTeacher(id) { if(confirm('Eliminar profesor?')) await db.collection('users').doc(id).delete(); handleRoute(); }
    async function renderAdminStudents(container) {
        const snap = await db.collection('users').where('role','==','student').get();
        container.innerHTML = `<div class="page-header"><h2>👥 Alumnos</h2><button class="btn btn-primary" onclick="showCreateStudentModal()">+ Nuevo Alumno</button></div><div class="card">${snap.docs.map(d=>`<div class="flex justify-between"><span>${escapeHtml(d.data().name)} (RUN: ${d.data().run||'—'}) ${d.data().email}</span><button class="btn btn-sm btn-danger" onclick="deleteStudent('${d.id}')">🗑️</button></div>`).join('')}</div>`;
    }
    function showCreateStudentModal() {
        openModal(`<h3>Nuevo Alumno</h3><div class="form-group"><label>Nombre</label><input type="text" id="studentName"></div><div class="form-group"><label>RUN (12345678-9)</label><input type="text" id="studentRun"></div><div class="form-group"><label>Email</label><input type="email" id="studentEmail"></div><div class="form-group"><label>Contraseña</label><input type="text" id="studentPass"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveStudent()">Crear</button></div>`);
    }
    async function saveStudent() {
        const name = document.getElementById('studentName').value.trim();
        const run = document.getElementById('studentRun').value.trim();
        const email = document.getElementById('studentEmail').value.trim();
        const pass = document.getElementById('studentPass').value;
        if(!name||!run||!email||!pass) return toast('Complete todo');
        if(!/^\d{7,8}-\d$/.test(run)) return toast('RUN inválido');
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        await db.collection('users').doc(cred.user.uid).set({ uid: cred.user.uid, name, run, email, role: 'student', enrolledCourses: [] });
        closeModal(); toast('Alumno creado','success'); handleRoute();
    }
    async function deleteStudent(id) { if(confirm('Eliminar alumno?')) await db.collection('users').doc(id).delete(); handleRoute(); }
    async function renderAdminResults(container) {
        const results = await db.collection('quizResults').get();
        container.innerHTML = `<div class="page-header"><h2>📊 Resultados</h2></div><div class="card">${results.docs.map(d=>`<div>${d.data().userId} - ${d.data().percentage}%</div>`).join('')}</div>`;
    }

    // ==================== PROFESOR ====================
    async function renderTeacherCourses(container) {
        const coursesSnap = await db.collection('courses').where('teacherId','==',currentUser.uid).get();
        container.innerHTML = `<div class="page-header"><h2>📚 Mis Cursos</h2></div><div class="grid">${coursesSnap.docs.map(c=>`<div class="course-card" onclick="navigate('teacher/courses/${c.id}')"><div class="card-body"><h4>${escapeHtml(c.data().title)}</h4></div></div>`).join('')}</div>`;
    }
    async function renderTeacherCourseDetail(container, courseId) {
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        const sessionRef = db.collection('activeClassSessions').doc(courseId);
        const sessionDoc = await sessionRef.get();
        const isActive = sessionDoc.exists ? sessionDoc.data().isActive : false;
        const startTime = sessionDoc.exists && sessionDoc.data().startTime ? sessionDoc.data().startTime.toDate() : null;
        let elapsed = 0;
        if (isActive && startTime) elapsed = Math.floor((Date.now() - startTime.getTime())/1000);
        const students = sessionDoc.exists ? sessionDoc.data().students || [] : [];
        container.innerHTML = `
            <div class="page-header"><h2>${escapeHtml(course.title)}</h2><button class="btn btn-secondary" onclick="navigate('teacher/courses')">← Volver</button></div>
            <div class="card text-center"><h3>🎥 Sala Virtual</h3><iframe src="https://meet.jit.si/inasep-${courseId}" allow="camera; microphone; fullscreen" style="width:100%; height:60vh; border-radius:12px;"></iframe>
            <div class="mt-2">${!isActive ? `<button class="btn btn-primary" onclick="iniciarClase('${courseId}')">🎬 Iniciar clase</button>` : `<div><strong>Tiempo de clase:</strong> ${Math.floor(elapsed/3600)}h ${Math.floor((elapsed%3600)/60)}m ${elapsed%60}s</div><button class="btn btn-danger" onclick="finalizarClase('${courseId}')">⏹️ Finalizar clase</button>`}</div></div>
            <div class="card"><h3>👥 Alumnos conectados (${students.length})</h3><ul>${students.map(s=>`<li>${escapeHtml(s.name)} - ${s.idSesionSence?'✅ Sesión iniciada':'⏳ Esperando'}</li>`).join('')}</ul></div>`;
        if (isActive) setTimeout(() => renderTeacherCourseDetail(container, courseId), 5000);
    }
    async function iniciarClase(courseId) {
        const teacherDoc = await db.collection('users').doc(currentUser.uid).get();
        const teacherRun = teacherDoc.data().run;
        if (!teacherRun) return toast('Tu RUN no está registrado. Contacta al admin.');
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        if (!course.senceEnabled) return toast('Curso no habilitado para SENCE');
        const params = new URLSearchParams();
        params.append('RutOtec', course.rutOtec);
        params.append('Token', course.tokenSence);
        params.append('CodSence', course.codigoSence);
        params.append('CodigoCurso', course.codigoCursoInterno);
        params.append('LineaCapacitacion', course.lineaCapacitacion);
        params.append('RunAlumno', teacherRun);
        params.append('IdSesionAlumno', `${currentUser.uid}-${Date.now()}`);
        params.append('UrlRetoma', window.location.origin + window.location.pathname + '#teacher/retorno');
        params.append('UrlError', window.location.origin + window.location.pathname + '#teacher/error');
        sessionStorage.setItem('senceTeacherCourseId', courseId);
        const form = document.createElement('form'); form.method='POST'; form.action='https://sistemas.sence.cl/rce/Registro/IniciarSesion';
        for(let [k,v] of params.entries()){ const inp=document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v; form.appendChild(inp); }
        document.body.appendChild(form); form.submit();
    }
    async function activarClaseEnFirestore(courseId, teacherIdSesionSence) {
        await db.collection('activeClassSessions').doc(courseId).set({
            isActive: true, startTime: firebase.firestore.FieldValue.serverTimestamp(),
            teacherId: currentUser.uid, teacherIdSesionSence, students: []
        }, {merge:true});
        toast('Clase iniciada. Los alumnos ya acumulan tiempo.','success');
        navigate(`teacher/courses/${courseId}`);
    }
    async function finalizarClase(courseId) {
        const sessionRef = db.collection('activeClassSessions').doc(courseId);
        const sessionDoc = await sessionRef.get();
        const session = sessionDoc.data();
        if (!session || !session.isActive) return toast('No hay clase activa');
        const endTime = Date.now();
        const startTime = session.startTime.toDate();
        const totalSeconds = Math.floor((endTime - startTime.getTime())/1000);
        for (const student of session.students) {
            if (student.idSesionSence) {
                await cerrarSesionSence(courseId, student.userId, student.idSesionSence, totalSeconds);
            }
        }
        if (session.teacherIdSesionSence) {
            await cerrarSesionSence(courseId, session.teacherId, session.teacherIdSesionSence, totalSeconds);
        }
        await sessionRef.update({ isActive: false, endTime: firebase.firestore.FieldValue.serverTimestamp(), totalSeconds });
        toast(`Clase finalizada. Duración: ${Math.floor(totalSeconds/60)} minutos.`,'success');
        if (confirm('¿Deseas enviar el reporte de avance a SENCE ahora?')) await enviarReporteSence(courseId);
        navigate(`teacher/courses/${courseId}`);
    }
    async function cerrarSesionSence(courseId, userId, idSesionSence, tiempoSegundos) {
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        const userDoc = await db.collection('users').doc(userId).get();
        const run = userDoc.data().run;
        if (!run) return;
        const params = new URLSearchParams();
        params.append('RutOtec', course.rutOtec);
        params.append('Token', course.tokenSence);
        params.append('CodSence', course.codigoSence);
        params.append('CodigoCurso', course.codigoCursoInterno);
        params.append('LineaCapacitacion', course.lineaCapacitacion);
        params.append('RunAlumno', run);
        params.append('IdSesionAlumno', `${userId}-${Date.now()}`);
        params.append('IdSesionSence', idSesionSence);
        params.append('UrlRetoma', window.location.origin + window.location.pathname);
        params.append('UrlError', window.location.origin + window.location.pathname);
        const form = document.createElement('form'); form.method='POST'; form.action='https://sistemas.sence.cl/rce/Registro/CerrarSesion';
        for(let [k,v] of params.entries()){ const inp=document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v; form.appendChild(inp); }
        document.body.appendChild(form); form.submit();
        await db.collection('senceSessions').add({ courseId, userId, run, tiempoConectividad: tiempoSegundos, fecha: new Date().toISOString().split('T')[0] });
    }

    // ==================== ALUMNO ====================
    async function renderStudentCourses(container) {
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const enrolled = userDoc.data().enrolledCourses || [];
        if (!enrolled.length) { container.innerHTML = '<div class="card">No estás inscrito en ningún curso.</div>'; return; }
        const courses = [];
        for (const cid of enrolled) { const c = await db.collection('courses').doc(cid).get(); if(c.exists) courses.push({id:cid, ...c.data()}); }
        container.innerHTML = `<div class="page-header"><h2>📚 Mis Cursos</h2></div><div class="grid">${courses.map(c=>`<div class="course-card" onclick="navigate('student/courses/${c.id}')"><div class="card-body"><h4>${escapeHtml(c.title)}</h4><p>Profesor: ${escapeHtml(c.teacherName||'No asignado')}</p></div></div>`).join('')}</div>`;
    }
    async function renderStudentCourseDetail(container, courseId) {
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const runAlumno = userDoc.data().run;
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        const sessionRef = db.collection('activeClassSessions').doc(courseId);
        const sessionDoc = await sessionRef.get();
        const isActive = sessionDoc.exists ? sessionDoc.data().isActive : false;
        const studentRegistered = sessionDoc.exists ? sessionDoc.data().students.some(s=>s.userId===currentUser.uid) : false;
        container.innerHTML = `
            <div class="page-header"><h2>${escapeHtml(course.title)}</h2><button class="btn btn-secondary" onclick="navigate('student/courses')">← Volver</button></div>
            <div class="card text-center"><h3>🎥 Sala Virtual</h3><iframe src="https://meet.jit.si/inasep-${courseId}" allow="camera; microphone; fullscreen" style="width:100%; height:60vh; border-radius:12px;"></iframe>
            <div class="mt-2">${!studentRegistered ? `<button class="btn btn-primary" onclick="registrarAsistenciaAlumno('${courseId}', '${runAlumno}')">🔑 Ingresar con ClaveÚnica</button>` : (isActive ? '<span class="badge" style="background:#27ae60;">✅ Clase en curso - Tu asistencia está siendo registrada</span>' : '<span class="badge">⏳ Clase finalizada</span>')}</div></div>`;
    }
    async function registrarAsistenciaAlumno(courseId, runAlumno) {
        if (!runAlumno) return toast('Tu RUN no está registrado. Contacta al administrador.');
        const courseDoc = await db.collection('courses').doc(courseId).get();
        const course = courseDoc.data();
        if (!course.senceEnabled) return toast('Este curso no está integrado con SENCE');
        const params = new URLSearchParams();
        params.append('RutOtec', course.rutOtec);
        params.append('Token', course.tokenSence);
        params.append('CodSence', course.codigoSence);
        params.append('CodigoCurso', course.codigoCursoInterno);
        params.append('LineaCapacitacion', course.lineaCapacitacion);
        params.append('RunAlumno', runAlumno);
        params.append('IdSesionAlumno', `${currentUser.uid}-${Date.now()}`);
        params.append('UrlRetoma', window.location.origin + window.location.pathname + '#student/retorno');
        params.append('UrlError', window.location.origin + window.location.pathname + '#student/error');
        sessionStorage.setItem('senceStudentCourseId', courseId);
        const form = document.createElement('form'); form.method='POST'; form.action='https://sistemas.sence.cl/rce/Registro/IniciarSesion';
        for(let [k,v] of params.entries()){ const inp=document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v; form.appendChild(inp); }
        document.body.appendChild(form); form.submit();
    }
    async function renderStudentResults(container) { container.innerHTML = '<div class="card">Próximamente resultados de exámenes</div>'; }

    // ==================== CAPTURA DE RETORNO SENCE ====================
    window.addEventListener('hashchange', async () => {
        const hash = window.location.hash;
        if (hash === '#student/retorno') {
            const courseId = sessionStorage.getItem('senceStudentCourseId');
            if (courseId) {
                const fakeId = 'SENCE_' + Date.now();
                await db.collection('activeClassSessions').doc(courseId).update({
                    students: firebase.firestore.FieldValue.arrayUnion({
                        userId: currentUser.uid,
                        run: currentUser.run,
                        idSesionSence: fakeId,
                        name: currentUser.displayName || currentUser.email
                    })
                });
                toast('✅ Asistencia registrada. Esperando que el profesor inicie la clase.','success');
                navigate(`student/courses/${courseId}`);
            }
        } else if (hash === '#teacher/retorno') {
            const courseId = sessionStorage.getItem('senceTeacherCourseId');
            if (courseId) {
                const fakeId = 'SENCE_TEACHER_' + Date.now();
                await activarClaseEnFirestore(courseId, fakeId);
            }
        }
    });

    // ==================== ENVÍO DE REPORTE SENCE ====================
    async function enviarReporteSence(courseId) {
        toast('Enviando reporte a SENCE... (implementar Cloud Function)');
        // Aquí llamarías a tu Cloud Function sendSenceReport
    }

    // ==================== UTILIDADES ====================
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
    function renderWelcome(container) { container.innerHTML = '<div class="card"><h2>Bienvenido a INASEP SENCE</h2><p>Plataforma de formación con integración de asistencia mediante ClaveÚnica.</p></div>'; }

    // Inicialización
    if (!window.location.hash) window.location.hash = '#welcome';
</script>
